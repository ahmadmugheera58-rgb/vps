name: BugHunter-Serveo
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH
      run: |
        sudo apt update && sudo apt install -y openssh-server
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Start Serveo Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH ACCESS 🔥"
        echo "======================================================"
        echo ""
        
        # Install ssh client and create tunnel
        ssh -o StrictHostKeyChecking=no -R 80:localhost:22 serveo.net > serveo.log 2>&1 &
        
        echo "⏳ Waiting for tunnel..."
        sleep 10
        
        echo "📡 Check your URL at: https://serveo.net"
        echo ""
        echo "💻 SSH Command:"
        echo "ssh -J serveo.net root@localhost"
        echo ""
        echo "🔑 Password: toor123"
        echo "======================================================"
        
        # Show logs
        cat serveo.log
        
        # Keep alive
        while true; do
          sleep 300
          echo "[$(date '+%H:%M:%S')] Session active - Check https://serveo.net for your URL"
        done
