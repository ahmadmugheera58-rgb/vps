name: BugHunter-Wush
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH with Custom Password
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        echo "✅ SSH configured with password: toor123"
        
    - name: Install Wush
      run: |
        # Download Wush binary directly (more reliable than install script)
        wget -O wush https://github.com/coder/wush/releases/latest/download/wush-linux-amd64
        chmod +x wush
        sudo mv wush /usr/local/bin/
        echo "✅ Wush installed"
        
    - name: Start Wush Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (WUSH) 🔥"
        echo "======================================================"
        echo ""
        
        # Start wush in the background
        wush serve :22 > wush.log 2>&1 &
        WUSH_PID=$!
        
        # Wait for auth key to generate
        echo "⏳ Waiting for auth key to generate..."
        sleep 8
        
        # Try to extract auth key
        echo "📡 WUSH AUTHENTICATION KEY:"
        echo ""
        
        # Get the auth key from logs
        AUTH_KEY=$(grep -o 'Auth: [a-zA-Z0-9]*' wush.log 2>/dev/null | head -1 | cut -d' ' -f2)
        
        if [ ! -z "$AUTH_KEY" ]; then
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "$AUTH_KEY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        else
          # If we can't extract, show the log
          echo "⚠️  Could not auto-extract key. Check logs below:"
          echo "──────────────────────────────────────"
          cat wush.log
          echo "──────────────────────────────────────"
          
          # Try to get key via wush command
          echo ""
          echo "📡 Trying alternative method to get auth key..."
          wush auth show 2>&1 | head -20
        fi
        
        echo ""
        echo "======================================================"
        echo "🔑 SSH Password: toor123"
        echo "======================================================"
        echo ""
        echo "📝 INSTRUCTIONS FOR WINDOWS:"
        echo "──────────────────────────────────────"
        echo "1. On your Windows machine, open Terminal (PowerShell)"
        echo "2. Download wush: curl -LO https://github.com/coder/wush/releases/latest/download/wush-windows-amd64.exe"
        echo "3. Rename it: ren wush-windows-amd64.exe wush.exe"
        echo "4. Run: .\wush.exe ssh"
        echo "5. When asked for Auth key, copy-paste the key above"
        echo "6. When asked for password, enter: toor123"
        echo "──────────────────────────────────────"
        
        # Show status updates
        COUNTER=0
        while true; do
          sleep 60
          COUNTER=$((COUNTER + 1))
          echo "[$(date '+%H:%M:%S')] Session active for $COUNTER minute(s) - Auth key: ${AUTH_KEY:-check logs above}"
        done
