name: BugHunter-Cloudflare
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Install Cloudflared & SSH
      run: |
        sudo apt update && sudo apt install -y wget openssh-server
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
    - name: Configure Root Access
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Start Cloudflare Tunnel
      run: |
        # Start tunnel in background
        cloudflared tunnel --url ssh://localhost:22 > cf.log 2>&1 &
        
        echo "⏳ Waiting for tunnel to establish (this takes 15-20 seconds)..."
        sleep 20
        
        # Get the URL
        URL=$(grep -o 'https://[-a-zA-Z0-9.]*\.trycloudflare\.com' cf.log | head -n 1)
        
        echo "══════════════════════════════════════════════════"
        echo "         🔥 BUG HUNTER SSH ACCESS 🔥"
        echo "══════════════════════════════════════════════════"
        echo ""
        
        if [ ! -z "$URL" ]; then
          echo "  📡 SSH Command:"
          echo "  ssh -o ProxyCommand=\"cloudflared access ssh --hostname $URL\" root@localhost"
          echo ""
          echo "  🔑 Password: toor123"
          echo ""
          echo "  ⏰ Session expires in: 6 hours"
        else
          echo "  ⚠️  URL not found in logs. Displaying last 20 lines:"
          echo "  ---------------------------------------------"
          tail -n 20 cf.log
          echo ""
          echo "  🔑 Password: toor123"
          echo ""
          echo "  💡 If you still don't see URL, try running manually after session starts:"
          echo "     cat cf.log | grep trycloudflare"
        fi
        
        echo "══════════════════════════════════════════════════"
        
        # Keep the session alive and show URL when found
        echo ""
        echo "📝 Monitoring for URL (will update when found):"
        
        # Keep checking for URL if not found yet
        while [ -z "$URL" ]; do
          sleep 5
          URL=$(grep -o 'https://[-a-zA-Z0-9.]*\.trycloudflare\.com' cf.log | head -n 1)
          if [ ! -z "$URL" ]; then
            echo ""
            echo "✅ URL FOUND: $URL"
            echo "✅ SSH Command: ssh -o ProxyCommand=\"cloudflared access ssh --hostname $URL\" root@localhost"
          fi
        done
        
        # Keep alive for 6 hours
        while true; do 
          sleep 300
          echo "⏱️  [$(date '+%H:%M:%S')] Session active - URL: $URL"
        done
