name: BugHunter-Wush
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH with Custom Password & Direct Root Login
      run: |
        # Set root password
        echo "root:toor123" | sudo chpasswd
        
        # Configure SSH for direct root login
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitRootLogin yes/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#ChallengeResponseAuthentication yes/ChallengeResponseAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/ChallengeResponseAuthentication no/ChallengeResponseAuthentication yes/' /etc/ssh/sshd_config
        
        # Restart SSH service
        sudo systemctl restart ssh
        echo "✅ SSH configured with direct root login and password: toor123"
        
    - name: Install Wush
      run: |
        wget -O wush.tar.gz https://github.com/coder/wush/releases/download/v0.4.1/wush_0.4.1_linux_amd64.tar.gz
        tar -xzf wush.tar.gz
        chmod +x wush
        sudo mv wush /usr/local/bin/
        rm wush.tar.gz
        echo "✅ Wush v0.4.1 installed"
        
    - name: Start Wush Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (WUSH) 🔥"
        echo "======================================================"
        echo ""
        
        # Start wush and capture output to get auth key
        echo "⏳ Starting wush server and generating auth key..."
        echo ""
        
        # Run wush serve and capture output in real-time
        wush serve :22 2>&1 | tee wush_output.log &
        WUSH_PID=$!
        
        # Wait for auth key to appear
        echo "⏳ Waiting for authentication key..."
        sleep 8
        
        # Try to extract auth key from log
        AUTH_KEY=$(grep -o '[a-zA-Z0-9]\{50,\}' wush_output.log 2>/dev/null | head -1)
        
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if [ ! -z "$AUTH_KEY" ]; then
          echo "🔑 YOUR AUTHENTICATION KEY:"
          echo "$AUTH_KEY"
        else
          echo "📡 WUSH SERVER RUNNING - CHECK BELOW FOR AUTH KEY:"
          echo ""
          # Show the last few lines of output which should contain the key
          tail -n 15 wush_output.log
        fi
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        echo ""
        echo "======================================================"
        echo "🔑 SSH Password: toor123"
        echo "======================================================"
        echo ""
        echo "📝 INSTRUCTIONS FOR WINDOWS (DIRECT ROOT LOGIN):"
        echo "──────────────────────────────────────────────────"
        echo "1. Download wush for Windows:"
        echo "   curl -LO https://github.com/coder/wush/releases/download/v0.4.1/wush_0.4.1_windows_amd64.exe"
        echo "   ren wush_0.4.1_windows_amd64.exe wush.exe"
        echo ""
        echo "2. Connect using the auth key above:"
        echo "   .\wush.exe ssh"
        echo ""
        echo "3. When prompted for password, enter: toor123"
        echo "   (You'll be automatically logged in as root)"
        echo "──────────────────────────────────────────────────"
        echo ""
        echo "📌 Once connected, you'll be at the root prompt:"
        echo "   root@fv-azure:~#"
        echo ""
        
        # Monitor and display auth key when it appears
        echo "📡 Monitoring for auth key (will update when found):"
        echo ""
        
        while true; do
          sleep 10
          # Check if we have the key, if not try to extract again
          if [ -z "$AUTH_KEY" ]; then
            NEW_KEY=$(grep -o '[a-zA-Z0-9]\{50,\}' wush_output.log 2>/dev/null | head -1)
            if [ ! -z "$NEW_KEY" ]; then
              AUTH_KEY=$NEW_KEY
              echo ""
              echo "══════════════════════════════════════════════════"
              echo "✅ AUTH KEY FOUND!"
              echo "══════════════════════════════════════════════════"
              echo "$AUTH_KEY"
              echo "══════════════════════════════════════════════════"
              echo ""
            fi
          fi
          
          # Show running message
          # echo "[$(date '+%H:%M:%S')] Session active - Auth key: ${AUTH_KEY:0:20}... (full key above)"
        done
